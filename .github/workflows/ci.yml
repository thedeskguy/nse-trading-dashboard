name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  # ── Backend: lint + test ───────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r backend/requirements.txt
          pip install ruff pytest httpx mypy types-requests

      - name: Lint (ruff)
        run: ruff check tools/ backend/ --select E,F,W --ignore E501

      - name: Type-check backend routes (syntax only)
        run: |
          python -c "import py_compile, glob
          for f in glob.glob('backend/**/*.py', recursive=True) + glob.glob('tools/**/*.py', recursive=True):
              py_compile.compile(f, doraise=True)
              print('OK', f)"

      - name: mypy (payments router)
        run: |
          cd backend
          mypy routers/payments.py --ignore-missing-imports --no-strict-optional

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  # ── Frontend: type-check + build ──────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_RAZORPAY_KEY_ID: rzp_test_placeholder
        run: npm run build
